<!DOCTYPE html>
<html>
<head>
  <title>Get the Food!</title>
  <style>
    body {
      margin: 0;
      background: lightblue;
      overflow: hidden;
      font-family: Arial;
    }
    canvas {
      display: block;
      margin: auto;
      background: lightblue;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let lives = parseInt(prompt("How many lives?")) || 3;
let timeLimit = parseInt(prompt("How much time (seconds)?")) || 60;

let score = 0;
let startTime = Date.now();

let player = {
  x: 400,
  y: 550,
  size: 20,
  speed: 20
};

let food = {
  x: Math.random() * 760 + 20,
  y: 0,
  size: 10 + Math.random() * 20,
  speed: 3 + Math.random() * 5
};

let enemy = {
  x: Math.random() * 760 + 20,
  y: 0,
  size: 30,
  speed: 6
};

// Controls
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft" && player.x > 20) {
    player.x -= player.speed;
  }
  if (e.key === "ArrowRight" && player.x < 780) {
    player.x += player.speed;
  }
});

function resetFood() {
  food.x = Math.random() * 760 + 20;
  food.y = 0;
  food.size = 10 + Math.random() * 20;
  food.speed = 3 + Math.random() * 5;
}

function resetEnemy() {
  enemy.x = Math.random() * 760 + 20;
  enemy.y = 0;
}

function drawCircle(obj, color) {
  ctx.beginPath();
  ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawPlayer() {
  ctx.fillStyle = "black";
  ctx.fillRect(player.x - 15, player.y - 15, 30, 30);
}

function drawText() {
  ctx.fillStyle = "black";
  ctx.font = "16px Arial";
  ctx.fillText("Score: " + score, 350, 20);
  ctx.fillText("Lives: " + lives, 50, 20);

  let elapsed = Math.floor((Date.now() - startTime) / 1000);
  let timeLeft = Math.max(0, timeLimit - elapsed);
  ctx.fillText("Time: " + timeLeft, 700, 20);

  return timeLeft;
}

function collision(a, b) {
  let dx = a.x - b.x;
  let dy = a.y - b.y;
  let dist = Math.sqrt(dx * dx + dy * dy);
  return dist < a.size + b.size;
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let timeLeft = drawText();

  // Move objects
  food.y += food.speed;
  enemy.y += enemy.speed;

  // Draw
  drawCircle(food, "green");
  drawCircle(enemy, "red");
  drawPlayer();

  // Collisions
  if (collision(player, food)) {
    score++;
    resetFood();
  }

  if (collision(player, enemy)) {
    endGame("Hit by enemy!");
    return;
  }

  // Missed food
  if (food.y > 600) {
    lives--;
    if (lives <= 0) {
      endGame("Out of lives!");
      return;
    }
    resetFood();
  }

  if (enemy.y > 600) {
    resetEnemy();
  }

  // Time up
  if (timeLeft <= 0) {
    endGame("Time's up!");
    return;
  }

  requestAnimationFrame(gameLoop);
}

function endGame(reason) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "black";
  ctx.font = "30px Arial";
  ctx.fillText("Game Over", 300, 250);
  ctx.font = "20px Arial";
  ctx.fillText(reason, 320, 300);
  ctx.fillText("Score: " + score, 330, 350);
}

// Start game
gameLoop();
</script>

</body>
</html>
